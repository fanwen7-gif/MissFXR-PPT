<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推动人类历史的人 · Sam Altman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F2EE;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --accent1: #1A1A1A;
    --gold: #C8A96E;
    --blue: #2D5A8E;
    --burgundy: #8B3A3A;
    --muted: #6B6560;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #E8E4DE; font-family: 'Inter', sans-serif; }
  #presentation { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; }
  #slides-wrapper { position: relative; width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; }
  .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; overflow: hidden; }
  .slide.active { opacity: 1; pointer-events: all; }
  #progress-bar { position: fixed; bottom: 0; left: 0; height: 1px; background: var(--gold); transition: width 0.35s ease; z-index: 1000; }
  #slide-counter { position: fixed; bottom: 16px; right: 20px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400; color: var(--muted); opacity: 0.6; z-index: 1000; letter-spacing: 0.05em; }
  #chapter-indicator { position: fixed; top: 16px; right: 20px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400; color: var(--muted); opacity: 0.6; z-index: 1000; letter-spacing: 0.08em; text-transform: uppercase; }
  .serif { font-family: 'Playfair Display', serif; }
  .sans { font-family: 'Inter', sans-serif; }
  .gold { color: var(--gold); }
  .muted { color: var(--muted); }
  .gold-line { width: 60px; height: 2px; background: var(--gold); margin: 20px 0; }
</style>
</head>
<body>
<div id="presentation">
  <div id="slides-wrapper">
TEST
  </div>
</div>
<div id="progress-bar"></div>
<div id="slide-counter">01 / 41</div>
<div id="chapter-indicator"></div>
<script>
var total = 41;
console.log('loaded');
</script>
</body>
</html>
